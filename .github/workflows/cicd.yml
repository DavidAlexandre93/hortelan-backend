name: Backend CI/CD

on:
  pull_request:
    branches: ['*']
  push:
    branches: ['main', 'master', 'develop']
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      action:
        description: 'deploy ou rollback'
        required: true
        default: deploy
        type: choice
        options:
          - deploy
          - rollback
      target_environment:
        description: 'Ambiente alvo'
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production
      rollback_image_tag:
        description: 'Tag da imagem para rollback (obrigatória quando action=rollback)'
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  security-events: write
  id-token: write

jobs:
  changes:
    name: Detectar escopo impactado
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Paths filter
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'app/**'
              - 'api/**'
              - 'tests/**'
              - 'requirements.txt'
              - 'pyproject.toml'
              - 'pytest.ini'
              - 'Dockerfile'
              - '.dockerignore'
              - '.github/workflows/**'

  quality:
    name: Quality gates (lint, format, tests)
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy pytest pytest-cov

      - name: Validate dependency graph
        run: pip check

      - name: Lint
        run: ruff check app api tests

      - name: Format check
        run: ruff format --check app api tests

      - name: Type check
        run: mypy app api --ignore-missing-imports

      - name: Unit tests
        run: pytest -q -m 'not integration' --cov=app --cov=api --cov-report=xml --cov-report=term-missing --cov-fail-under=85

      - name: Integration tests
        run: pytest -q -m integration

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-py${{ matrix.python-version }}
          path: |
            coverage.xml
            .coverage
          if-no-files-found: ignore

  security:
    name: Security scans (SAST, dependencies, secrets)
    needs: [changes, quality]
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install security tooling
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install bandit pip-audit detect-secrets

      - name: Bandit
        run: bandit -r app api -x tests -ll

      - name: pip-audit (strict)
        run: pip-audit --requirement requirements.txt

      - name: detect-secrets baseline
        run: detect-secrets scan --all-files > .secrets.baseline

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload security artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: security-artifacts
          path: |
            .secrets.baseline
          if-no-files-found: ignore

  sonar:
    name: SonarQube analysis (code smells + coverage)
    needs: [changes, quality]
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
    steps:
      - name: Validate SonarQube configuration
        run: |
          set -euo pipefail
          if [[ -z "${SONAR_TOKEN}" ]]; then
            echo "SONAR_TOKEN não configurado nos secrets do repositório/organização."
            exit 1
          fi
          if [[ -z "${SONAR_HOST_URL}" ]]; then
            echo "SONAR_HOST_URL não configurado nas variables do repositório/organização."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download coverage report (Python 3.11)
        uses: actions/download-artifact@v6
        with:
          name: coverage-py3.11
          path: .

      - name: SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
        with:
          args: >-
            -Dsonar.projectKey=${{ github.repository }}
            -Dsonar.projectName=${{ github.event.repository.name }}
            -Dsonar.sources=app,api
            -Dsonar.tests=tests
            -Dsonar.python.coverage.reportPaths=coverage.xml
            -Dsonar.python.version=3.11,3.12
            -Dsonar.sourceEncoding=UTF-8

      - name: SonarQube quality gate
        uses: SonarSource/sonarqube-quality-gate-action@v1.2.0
        timeout-minutes: 10
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}

  build-package:
    name: Build package and version artifacts
    needs: [changes, quality, security, sonar]
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      artifact_version: ${{ steps.meta.outputs.artifact_version }}
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Build package
        run: |
          python -m pip install --upgrade pip
          pip install build
          python -m build

      - name: Generate artifact metadata
        id: meta
        run: |
          VERSION=$(python - <<'PY'
          import tomllib
          with open('pyproject.toml', 'rb') as f:
              print(tomllib.load(f)['project']['version'])
          PY
          )
          SHORT_SHA="${GITHUB_SHA::7}"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            IMAGE_TAG="${GITHUB_REF_NAME}"
          else
            IMAGE_TAG="${VERSION}-${SHORT_SHA}"
          fi
          ARTIFACT_VERSION="${VERSION}+${SHORT_SHA}"
          echo "artifact_version=${ARTIFACT_VERSION}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          cat > build-metadata.json <<EOF
          {
            "artifact_version": "${ARTIFACT_VERSION}",
            "image_tag": "${IMAGE_TAG}",
            "git_ref": "${GITHUB_REF}",
            "git_sha": "${GITHUB_SHA}",
            "built_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF

      - name: Upload package artifacts
        uses: actions/upload-artifact@v7
        with:
          name: python-dist-${{ steps.meta.outputs.artifact_version }}
          path: |
            dist/*
            build-metadata.json

  build-image:
    name: Build and publish container image
    needs: build-package
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      image_ref: ${{ steps.image.outputs.image_ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        id: image
        run: |
          IMAGE_REPO="ghcr.io/${GITHUB_REPOSITORY,,}"
          IMAGE_TAG="${{ needs.build-package.outputs.image_tag }}"
          IMAGE_REF="${IMAGE_REPO}:${IMAGE_TAG}"
          docker build -t "${IMAGE_REF}" -t "${IMAGE_REPO}:sha-${GITHUB_SHA::7}" .
          docker push "${IMAGE_REF}"
          docker push "${IMAGE_REPO}:sha-${GITHUB_SHA::7}"
          echo "image_ref=${IMAGE_REF}" >> "$GITHUB_OUTPUT"

  deploy-staging:
    name: Deploy staging
    needs: [changes, build-image]
    if: >-
      github.event_name != 'pull_request' &&
      (github.ref == 'refs/heads/develop' || (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'deploy' && github.event.inputs.target_environment == 'staging'))
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Deploy via SSH (staging)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT || '22' }}
          script: |
            set -euo pipefail
            echo "${{ secrets.GHCR_READ_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_READ_USER }}" --password-stdin
            IMAGE="${{ needs.build-image.outputs.image_ref }}"
            docker pull "$IMAGE"
            docker stop hortelan-backend || true
            docker rm hortelan-backend || true
            docker run -d --name hortelan-backend --restart always \
              --env-file "${{ vars.DEPLOY_ENV_FILE_PATH }}" \
              -p "${{ vars.APP_PORT || '8000' }}:8000" \
              "$IMAGE"
            docker image prune -f

  deploy-production:
    name: Deploy production (controlled)
    needs: [changes, build-image, deploy-staging]
    if: >-
      github.event_name != 'pull_request' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'deploy' && github.event.inputs.target_environment == 'production'))
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy via SSH (production)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT || '22' }}
          script: |
            set -euo pipefail
            echo "${{ secrets.GHCR_READ_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_READ_USER }}" --password-stdin
            IMAGE="${{ needs.build-image.outputs.image_ref }}"
            docker pull "$IMAGE"
            docker tag "$(docker inspect --format='{{.Image}}' hortelan-backend 2>/dev/null || true)" "hortelan-backend:rollback" || true
            docker stop hortelan-backend || true
            docker rm hortelan-backend || true
            docker run -d --name hortelan-backend --restart always \
              --env-file "${{ vars.DEPLOY_ENV_FILE_PATH }}" \
              -p "${{ vars.APP_PORT || '8000' }}:8000" \
              "$IMAGE"
            docker image prune -f

  post-deploy-observability:
    name: Post-deploy observability checks
    needs: [deploy-staging, deploy-production]
    if: always() && (needs.deploy-staging.result == 'success' || needs.deploy-production.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Validate health and metrics
        run: |
          set -euo pipefail
          BASE_URL="${{ vars.OBSERVABILITY_BASE_URL }}"
          if [[ -z "$BASE_URL" ]]; then
            echo "OBSERVABILITY_BASE_URL não definido para o ambiente."
            exit 1
          fi
          curl -fsS "$BASE_URL/health"
          curl -fsS "$BASE_URL/health/ready"
          curl -fsS "$BASE_URL/metrics" | head -n 20

  rollback-production:
    name: Rollback production
    needs: changes
    if: >-
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.action == 'rollback' &&
      github.event.inputs.target_environment == 'production'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Validate rollback input
        run: |
          if [[ -z "${{ github.event.inputs.rollback_image_tag }}" ]]; then
            echo "rollback_image_tag é obrigatório para rollback"
            exit 1
          fi

      - name: Rollback via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT || '22' }}
          script: |
            set -euo pipefail
            echo "${{ secrets.GHCR_READ_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_READ_USER }}" --password-stdin
            IMAGE="ghcr.io/${GITHUB_REPOSITORY,,}:${{ github.event.inputs.rollback_image_tag }}"
            docker pull "$IMAGE"
            docker stop hortelan-backend || true
            docker rm hortelan-backend || true
            docker run -d --name hortelan-backend --restart always \
              --env-file "${{ vars.DEPLOY_ENV_FILE_PATH }}" \
              -p "${{ vars.APP_PORT || '8000' }}:8000" \
              "$IMAGE"
