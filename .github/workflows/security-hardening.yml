name: Security Hardening

on:
  pull_request:
    branches: ["*"]
  push:
    branches: ["main", "master", "develop"]
  schedule:
    - cron: '0 3 * * *'

permissions:
  contents: read
  security-events: write

jobs:
  dependency-review:
    name: Dependency review (PR)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Dependency review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate

  sast-codeql:
    name: CodeQL SAST
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          config-file: ./.github/codeql/codeql-config.yml

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Analyze
        uses: github/codeql-action/analyze@v3

  python-security:
    name: Python security scans
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install bandit pip-audit detect-secrets

      - name: Bandit SAST
        run: bandit -r app api -x tests -ll

      - name: Vulnerability audit
        run: pip-audit --requirement requirements.txt --strict

      - name: Secret baseline scan
        run: |
          detect-secrets scan --all-files > .secrets.baseline
          detect-secrets audit .secrets.baseline --stats || true

      - name: Upload baseline artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detect-secrets-baseline
          path: .secrets.baseline
          if-no-files-found: ignore
